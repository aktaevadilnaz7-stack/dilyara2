<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dilyara Project</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER (FLEXBOX) -->
<header class="header">
  <div class="logo">Dilyara DJ2503</div>

  <nav>
    <ul class="nav">
      <li><a href="#">Home</a></li>
      <li><a href="#">Cards</a></li>
      <li><a href="#">Grid</a></li>
      <li><a href="#">Gallery</a></li>
    </ul>
  </nav>
</header>

<!-- CARDS SECTION (3 IMAGES) -->
<section class="section">
  <h2>Cards Section</h2>

  <div class="cards">
    <div class="card">
      <img src="img/PHOTO1.jpeg" alt="">
      <h3>Card 1</h3>
      <p>Flexbox card layout example.</p>
    </div>

    <div class="card">
      <img src="img/PHOTO2.jpeg" alt="">
      <h3>Card 2</h3>
      <p>Clean and simple design.</p>
    </div>

    <div class="card">
      <img src="img/PHOTO3.jpeg" alt="">
      <h3>Card 3</h3>
      <p>Equal height cards using Flexbox.</p>
    </div>
  </div>
</section>

<!-- GRID LAYOUT -->
<section class="grid-layout">

  <header class="box header-box">Header Area</header>
  <aside class="box sidebar">Sidebar Area</aside>
  <main class="box main">Main Content Area</main>
  <footer class="box footer">Footer Area</footer>

</section>

<!-- GALLERY (9 PHOTOS) -->
<section class="section">
  <h2>Image Gallery</h2>

  <div class="gallery">
    <img src="img/PHOTO4.jpeg">
    <img src="img/PHOTO5.jpeg">
    <img src="img/PHOTO6.jpeg">

    <img src="img/PHOTO7.jpeg">
    <img src="img/PHOTO8.jpeg">
    <img src="img/PHOTO9.jpeg">
  </div>
</section>

<!-- FOOTER -->
<footer class="page-footer">

</footer>
